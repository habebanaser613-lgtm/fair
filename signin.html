            </div>
        <button class="theme-toggle" id="themed">🌙 Dark Mode</button>
    </nav>
    <div class="container">
        <h1>Create account</h1>
        <div class="content">
        <form id="signIn">
            <label for="">First name:</label>
            <input type="text" name="firstname" id="firstname"required>
            <span id="firstnameError" class="error-msg"></span>
            <label for="">Last name:</label>
            <input type="text" name="lastname" id="lastname" required>
            <span id="secondnameError" class="error-msg"></span>
            <label for="">User name:</label>
            <input type="text" name="username" id="username">
            <span id="nameError" class="error-msg"></span>
            <label for="">Birth date:</label>
            <input type="date" name="birthdate" id="birthdate">
            <span  class="error-msg"></span>
            <label for="">Email:</label>
            <input type="email" name="email" id="email" required>
            <span id="emailError" class="error-msg"></span>
            <label>Password:</label>
            <input type="password" name="Pass" id="Pass" required minlength="8" maxlength="16">
            <span id="passError" class="error-msg"></span>
            <label>Confirm password:</label>
            <input type="password" name="confirm" id="confirm" required minlength="8" maxlength="16">
            <span id="confirmError" class="error-msg"></span>
            <label for="">Phone number:</label>
            <input type="tel" name="phone number" id="phoneNumber">
            <span id="phoneError" class="error-msg"></span>
            <label for="">Address:</label>
            <input type="text" name="address">
            <button type="submit">Create</button>
        </form>
        <h3>Already have an account?</h3>
        <a href="login.html"  class="log">Log in</a>
        </div>
    </div>
<footer>
